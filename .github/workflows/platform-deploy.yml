name: Platform Deploy

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to deploy, for example v0.2.0-prod-20260402-1'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: platform-deploy-${{ inputs.release_tag || github.run_id }}
  cancel-in-progress: false

env:
  SOURCE_REPO: officecli/officecli
  SOURCE_DEFAULT_BRANCH: main

jobs:
  preflight:
    name: Resolve Optional Secret Gates
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.flags.outputs.ready }}
      missing: ${{ steps.flags.outputs.missing }}
    steps:
      - name: Resolve flags
        id: flags
        env:
          PLATFORM_APP_SESSION_SECRET: ${{ secrets.PLATFORM_APP_SESSION_SECRET || '' }}
          PLATFORM_LICENSE_PROOF_SEED: ${{ secrets.PLATFORM_LICENSE_PROOF_SEED || '' }}
          PLATFORM_PREVIEW_OBJECT_ACCESS_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_ACCESS_KEY || '' }}
          PLATFORM_PREVIEW_OBJECT_SECRET_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_SECRET_KEY || '' }}
          PLATFORM_OFFICESDK_JWT_SECRET: ${{ secrets.PLATFORM_OFFICESDK_JWT_SECRET || '' }}
          PLATFORM_SSH_PRIVATE_KEY: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY || '' }}
          PLATFORM_PREVIEW_OBJECT_ENDPOINT: ${{ vars.PLATFORM_PREVIEW_OBJECT_ENDPOINT || '' }}
          PLATFORM_OFFICESDK_HOST: ${{ vars.PLATFORM_OFFICESDK_HOST || '' }}
        run: |
          missing=()
          if [ -z "${PLATFORM_APP_SESSION_SECRET}" ]; then
            missing+=("PLATFORM_APP_SESSION_SECRET")
          fi
          if [ -z "${PLATFORM_LICENSE_PROOF_SEED}" ]; then
            missing+=("PLATFORM_LICENSE_PROOF_SEED")
          fi
          if [ -z "${PLATFORM_PREVIEW_OBJECT_ACCESS_KEY}" ]; then
            missing+=("PLATFORM_PREVIEW_OBJECT_ACCESS_KEY")
          fi
          if [ -z "${PLATFORM_PREVIEW_OBJECT_SECRET_KEY}" ]; then
            missing+=("PLATFORM_PREVIEW_OBJECT_SECRET_KEY")
          fi
          if [ -z "${PLATFORM_OFFICESDK_JWT_SECRET}" ]; then
            missing+=("PLATFORM_OFFICESDK_JWT_SECRET")
          fi
          if [ -z "${PLATFORM_SSH_PRIVATE_KEY}" ]; then
            missing+=("PLATFORM_SSH_PRIVATE_KEY or SSH_PRIVATE_KEY")
          fi
          if [ -z "${PLATFORM_PREVIEW_OBJECT_ENDPOINT}" ]; then
            missing+=("PLATFORM_PREVIEW_OBJECT_ENDPOINT")
          fi
          if [ -z "${PLATFORM_OFFICESDK_HOST}" ]; then
            missing+=("PLATFORM_OFFICESDK_HOST")
          fi
          ready=true
          if [ "${#missing[@]}" -gt 0 ]; then
            ready=false
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"
          echo "missing=$(IFS=', '; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"

      - name: Append preflight summary
        run: |
          if [ "${{ steps.flags.outputs.ready }}" = "true" ]; then
            echo "Platform Deploy prerequisites are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Platform Deploy skipped because required configuration is missing: ${{ steps.flags.outputs.missing }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    name: Build and deploy officecli-platform
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ vars.PLATFORM_SERVER_HOST || '18.141.191.80' }}
      SERVER_USER: ${{ vars.PLATFORM_SERVER_USER || 'ubuntu' }}
      SSH_PORT: ${{ vars.PLATFORM_SSH_PORT || '22' }}
      REMOTE_WORKDIR: ${{ vars.PLATFORM_REMOTE_WORKDIR || '/opt/officecli-platform' }}
      REMOTE_SITE_DIR: ${{ vars.PLATFORM_REMOTE_SITE_DIR || '/var/www/officecli.io/dist' }}
      REMOTE_APP_DIR: ${{ vars.PLATFORM_REMOTE_APP_DIR || '/var/www/platform.officecli.io/app' }}
      REMOTE_ADMIN_DIR: ${{ vars.PLATFORM_REMOTE_ADMIN_DIR || '/var/www/platform.officecli.io/admin' }}
      KUBE_NAMESPACE: ${{ vars.PLATFORM_KUBE_NAMESPACE || 'officecli' }}
      DEPLOYMENT_NAME: ${{ vars.PLATFORM_DEPLOYMENT_NAME || 'officecli-platform' }}
      CONTAINER_NAME: ${{ vars.PLATFORM_CONTAINER_NAME || 'platform' }}
      IMAGE_REPO: ${{ vars.PLATFORM_IMAGE_REPO || 'docker.io/library/officecli-platform' }}
      SECRET_NAME: ${{ vars.PLATFORM_SECRET_NAME || 'officecli-platform-env' }}
      APP_ENV: ${{ vars.PLATFORM_APP_ENV || 'production' }}
      SITE_BASE_URL: ${{ vars.PLATFORM_SITE_BASE_URL || 'https://officecli.io' }}
      PLATFORM_BASE_URL: ${{ vars.PLATFORM_PLATFORM_BASE_URL || 'https://platform.officecli.io' }}
      APP_SESSION_TTL: ${{ vars.PLATFORM_APP_SESSION_TTL || '24h' }}
      APP_SESSION_COOKIE_DOMAIN: ${{ vars.PLATFORM_APP_SESSION_COOKIE_DOMAIN || '.officecli.io' }}
      PREVIEW_OBJECT_ENDPOINT: ${{ vars.PLATFORM_PREVIEW_OBJECT_ENDPOINT }}
      PREVIEW_OBJECT_BUCKET: ${{ vars.PLATFORM_PREVIEW_OBJECT_BUCKET || 'officecli-preview' }}
      PREVIEW_OBJECT_USE_SSL: ${{ vars.PLATFORM_PREVIEW_OBJECT_USE_SSL || 'false' }}
      OFFICESDK_HOST: ${{ vars.PLATFORM_OFFICESDK_HOST }}
      OFFICESDK_ENDPOINT: ${{ vars.PLATFORM_OFFICESDK_ENDPOINT || 'https://officecli.io/sdk/turbo-ai' }}
      APP_SESSION_SECRET: ${{ secrets.PLATFORM_APP_SESSION_SECRET }}
      LICENSE_PROOF_SEED: ${{ secrets.PLATFORM_LICENSE_PROOF_SEED }}
      PREVIEW_OBJECT_ACCESS_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_ACCESS_KEY }}
      PREVIEW_OBJECT_SECRET_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_SECRET_KEY }}
      OFFICESDK_JWT_SECRET: ${{ secrets.PLATFORM_OFFICESDK_JWT_SECRET }}
    steps:
      - name: Checkout public CI repo
        uses: actions/checkout@v6.0.2

      - name: Checkout private source repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_DEFAULT_BRANCH }}
          path: source
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target deploy tag
        id: target
        shell: bash
        run: |
          set -euo pipefail
          git -C source fetch --tags --force
          release_tag=""
          if [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
            if [[ "${release_tag}" != v* ]]; then
              release_tag="v${release_tag}"
            fi
            git -C source rev-parse "${release_tag}^{commit}" >/dev/null 2>&1
          else
            state_file="${GITHUB_WORKSPACE}/.state/platform-deploy-tags.txt"
            touch "${state_file}"
            while IFS= read -r candidate; do
              [ -z "${candidate}" ] && continue
              if grep -Fxq "${candidate}" "${state_file}"; then
                continue
              fi
              release_tag="${candidate}"
              break
            done < <(git -C source tag --list 'v*-prod-*' --sort=-creatordate)
          fi
          should_run=false
          if [ -n "${release_tag}" ]; then
            should_run=true
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

      - name: Stop when no unprocessed production deploy tag exists
        if: steps.target.outputs.should_run != 'true'
        run: echo "No unprocessed platform deploy tag detected."

      - name: Checkout target release tag
        if: steps.target.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git -C source checkout --detach "${{ steps.target.outputs.release_tag }}"

      - name: Setup Go
        if: steps.target.outputs.should_run == 'true'
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: source/platform/go.mod
          cache-dependency-path: source/platform/go.sum

      - name: Setup Node
        if: steps.target.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            source/platform/web/app/package-lock.json
            source/platform/web/admin/package-lock.json
            source/platform/web/site/package-lock.json

      - name: Install app dependencies
        if: steps.target.outputs.should_run == 'true'
        working-directory: source/platform/web/app
        run: npm ci

      - name: Install admin dependencies
        if: steps.target.outputs.should_run == 'true'
        working-directory: source/platform/web/admin
        run: npm ci

      - name: Install site dependencies
        if: steps.target.outputs.should_run == 'true'
        working-directory: source/platform/web/site
        run: npm ci

      - name: Prepare SSH
        if: steps.target.outputs.should_run == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PLATFORM_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Prepare production secret env file
        if: steps.target.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          required_keys=(
            APP_SESSION_SECRET
            LICENSE_PROOF_SEED
            PREVIEW_OBJECT_ENDPOINT
            PREVIEW_OBJECT_ACCESS_KEY
            PREVIEW_OBJECT_SECRET_KEY
            PREVIEW_OBJECT_BUCKET
            OFFICESDK_HOST
            OFFICESDK_ENDPOINT
            OFFICESDK_JWT_SECRET
          )
          for key in "${required_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required production config: ${key}" >&2
              exit 1
            fi
          done
          env_file="${RUNNER_TEMP}/platform-prod-sync.env"
          : > "${env_file}"
          printf 'APP_ENV=%s\n' "${APP_ENV}" >> "${env_file}"
          printf 'SITE_BASE_URL=%s\n' "${SITE_BASE_URL}" >> "${env_file}"
          printf 'PLATFORM_BASE_URL=%s\n' "${PLATFORM_BASE_URL}" >> "${env_file}"
          printf 'APP_SESSION_SECRET=%s\n' "${APP_SESSION_SECRET}" >> "${env_file}"
          printf 'LICENSE_PROOF_SEED=%s\n' "${LICENSE_PROOF_SEED}" >> "${env_file}"
          printf 'APP_SESSION_TTL=%s\n' "${APP_SESSION_TTL}" >> "${env_file}"
          printf 'APP_SESSION_COOKIE_DOMAIN=%s\n' "${APP_SESSION_COOKIE_DOMAIN}" >> "${env_file}"
          printf 'PREVIEW_OBJECT_ENDPOINT=%s\n' "${PREVIEW_OBJECT_ENDPOINT}" >> "${env_file}"
          printf 'PREVIEW_OBJECT_ACCESS_KEY=%s\n' "${PREVIEW_OBJECT_ACCESS_KEY}" >> "${env_file}"
          printf 'PREVIEW_OBJECT_SECRET_KEY=%s\n' "${PREVIEW_OBJECT_SECRET_KEY}" >> "${env_file}"
          printf 'PREVIEW_OBJECT_BUCKET=%s\n' "${PREVIEW_OBJECT_BUCKET}" >> "${env_file}"
          printf 'PREVIEW_OBJECT_USE_SSL=%s\n' "${PREVIEW_OBJECT_USE_SSL}" >> "${env_file}"
          printf 'OFFICESDK_HOST=%s\n' "${OFFICESDK_HOST}" >> "${env_file}"
          printf 'OFFICESDK_ENDPOINT=%s\n' "${OFFICESDK_ENDPOINT}" >> "${env_file}"
          printf 'OFFICESDK_JWT_SECRET=%s\n' "${OFFICESDK_JWT_SECRET}" >> "${env_file}"
          echo "PLATFORM_ENV_FILE=${env_file}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ steps.target.outputs.release_tag }}" >> "$GITHUB_ENV"

      - name: Deploy platform production
        if: steps.target.outputs.should_run == 'true'
        working-directory: source
        run: ./scripts/deploy-platform-prod.sh "${RELEASE_TAG}"

      - name: Verify production endpoints
        if: steps.target.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "${SITE_BASE_URL}/" >/dev/null
          curl -fsS "${SITE_BASE_URL}/api/pricing" >/dev/null
          curl -fsS "${PLATFORM_BASE_URL}/app/" >/dev/null
          curl -fsS "${PLATFORM_BASE_URL}/admin/" >/dev/null
          curl -fsS "${PLATFORM_BASE_URL}/healthz" >/dev/null

      - name: Persist processed platform deploy tag
        if: success() && steps.target.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          touch .state/platform-deploy-tags.txt
          if ! grep -Fxq "${{ steps.target.outputs.release_tag }}" .state/platform-deploy-tags.txt; then
            printf '%s\n' "${{ steps.target.outputs.release_tag }}" >> .state/platform-deploy-tags.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/platform-deploy-tags.txt
          git diff --cached --quiet && exit 0
          git commit -m "ci: track platform deploy ${{ steps.target.outputs.release_tag }} [skip ci]"
          git push origin HEAD:main
