name: Platform Sync Prod Secret

on:
  workflow_dispatch:
    inputs:
      restart_deployment:
        description: 'Restart officecli-platform after syncing the Secret'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  sync_secret:
    name: Sync officecli-platform-env
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.PLATFORM_SERVER_HOST || vars.PLATFORM_SERVER_HOST || '18.141.191.80' }}
      SERVER_USER: ${{ secrets.PLATFORM_SERVER_USER || vars.PLATFORM_SERVER_USER || 'ubuntu' }}
      SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT || vars.PLATFORM_SSH_PORT || '22' }}
      KUBE_NAMESPACE: ${{ secrets.PLATFORM_KUBE_NAMESPACE || vars.PLATFORM_KUBE_NAMESPACE || 'officecli' }}
      SECRET_NAME: ${{ secrets.PLATFORM_SECRET_NAME || vars.PLATFORM_SECRET_NAME || 'officecli-platform-env' }}
      DEPLOYMENT_NAME: ${{ secrets.PLATFORM_DEPLOYMENT_NAME || vars.PLATFORM_DEPLOYMENT_NAME || 'officecli-platform' }}
      APP_ENV: ${{ vars.PLATFORM_APP_ENV || 'production' }}
      SITE_BASE_URL: ${{ vars.PLATFORM_SITE_BASE_URL || 'https://officecli.io' }}
      PLATFORM_BASE_URL: ${{ vars.PLATFORM_PLATFORM_BASE_URL || 'https://platform.officecli.io' }}
      APP_SESSION_TTL: ${{ vars.PLATFORM_APP_SESSION_TTL || '24h' }}
      APP_SESSION_COOKIE_DOMAIN: ${{ vars.PLATFORM_APP_SESSION_COOKIE_DOMAIN || '.officecli.io' }}
      PREVIEW_OBJECT_ENDPOINT: ${{ secrets.PLATFORM_PREVIEW_OBJECT_ENDPOINT || vars.PLATFORM_PREVIEW_OBJECT_ENDPOINT }}
      PREVIEW_OBJECT_BUCKET: ${{ vars.PLATFORM_PREVIEW_OBJECT_BUCKET || 'officecli-preview' }}
      PREVIEW_OBJECT_USE_SSL: ${{ vars.PLATFORM_PREVIEW_OBJECT_USE_SSL || 'false' }}
      OFFICESDK_HOST: ${{ secrets.PLATFORM_OFFICESDK_HOST || vars.PLATFORM_OFFICESDK_HOST }}
      OFFICESDK_ENDPOINT: ${{ vars.PLATFORM_OFFICESDK_ENDPOINT || 'https://officecli.io/sdk/turbo-ai' }}
      APP_SESSION_SECRET: ${{ secrets.PLATFORM_APP_SESSION_SECRET }}
      LICENSE_PROOF_SEED: ${{ secrets.PLATFORM_LICENSE_PROOF_SEED }}
      PREVIEW_OBJECT_ACCESS_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_ACCESS_KEY }}
      PREVIEW_OBJECT_SECRET_KEY: ${{ secrets.PLATFORM_PREVIEW_OBJECT_SECRET_KEY }}
      OFFICESDK_JWT_SECRET: ${{ secrets.PLATFORM_OFFICESDK_JWT_SECRET }}
    steps:
      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PLATFORM_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host platform-prod
            HostName ${SERVER_HOST}
            User ${SERVER_USER}
            Port ${SSH_PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify SSH access
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o LogLevel=ERROR platform-prod 'exit 0'

      - name: Validate production config
        run: |
          set -euo pipefail
          required_keys=(
            APP_SESSION_SECRET
            LICENSE_PROOF_SEED
            PREVIEW_OBJECT_ENDPOINT
            PREVIEW_OBJECT_ACCESS_KEY
            PREVIEW_OBJECT_SECRET_KEY
            PREVIEW_OBJECT_BUCKET
            OFFICESDK_HOST
            OFFICESDK_ENDPOINT
            OFFICESDK_JWT_SECRET
          )
          for key in "${required_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required production config: ${key}" >&2
              exit 1
            fi
          done

      - name: Patch production secret
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=10 platform-prod \
            KUBE_NAMESPACE="${KUBE_NAMESPACE}" \
            SECRET_NAME="${SECRET_NAME}" \
            DEPLOYMENT_NAME="${DEPLOYMENT_NAME}" \
            APP_ENV="${APP_ENV}" \
            SITE_BASE_URL="${SITE_BASE_URL}" \
            PLATFORM_BASE_URL="${PLATFORM_BASE_URL}" \
            APP_SESSION_SECRET="${APP_SESSION_SECRET}" \
            LICENSE_PROOF_SEED="${LICENSE_PROOF_SEED}" \
            APP_SESSION_TTL="${APP_SESSION_TTL}" \
            APP_SESSION_COOKIE_DOMAIN="${APP_SESSION_COOKIE_DOMAIN}" \
            PREVIEW_OBJECT_ENDPOINT="${PREVIEW_OBJECT_ENDPOINT}" \
            PREVIEW_OBJECT_ACCESS_KEY="${PREVIEW_OBJECT_ACCESS_KEY}" \
            PREVIEW_OBJECT_SECRET_KEY="${PREVIEW_OBJECT_SECRET_KEY}" \
            PREVIEW_OBJECT_BUCKET="${PREVIEW_OBJECT_BUCKET}" \
            PREVIEW_OBJECT_USE_SSL="${PREVIEW_OBJECT_USE_SSL}" \
            OFFICESDK_HOST="${OFFICESDK_HOST}" \
            OFFICESDK_ENDPOINT="${OFFICESDK_ENDPOINT}" \
            OFFICESDK_JWT_SECRET="${OFFICESDK_JWT_SECRET}" \
            RESTART_DEPLOYMENT="${{ inputs.restart_deployment }}" \
            'bash -se' <<'EOF'
          set -euo pipefail
          kubectl -n "${KUBE_NAMESPACE}" get secret "${SECRET_NAME}" >/dev/null
          payload="$(python3 - <<'PY'
          import json
          import os

          data = {
              "APP_ENV": os.environ["APP_ENV"],
              "SITE_BASE_URL": os.environ["SITE_BASE_URL"],
              "PLATFORM_BASE_URL": os.environ["PLATFORM_BASE_URL"],
              "APP_SESSION_SECRET": os.environ["APP_SESSION_SECRET"],
              "LICENSE_PROOF_SEED": os.environ["LICENSE_PROOF_SEED"],
              "APP_SESSION_TTL": os.environ["APP_SESSION_TTL"],
              "APP_SESSION_COOKIE_DOMAIN": os.environ["APP_SESSION_COOKIE_DOMAIN"],
              "PREVIEW_OBJECT_ENDPOINT": os.environ["PREVIEW_OBJECT_ENDPOINT"],
              "PREVIEW_OBJECT_ACCESS_KEY": os.environ["PREVIEW_OBJECT_ACCESS_KEY"],
              "PREVIEW_OBJECT_SECRET_KEY": os.environ["PREVIEW_OBJECT_SECRET_KEY"],
              "PREVIEW_OBJECT_BUCKET": os.environ["PREVIEW_OBJECT_BUCKET"],
              "PREVIEW_OBJECT_USE_SSL": os.environ["PREVIEW_OBJECT_USE_SSL"],
              "OFFICESDK_HOST": os.environ["OFFICESDK_HOST"],
              "OFFICESDK_ENDPOINT": os.environ["OFFICESDK_ENDPOINT"],
              "OFFICESDK_JWT_SECRET": os.environ["OFFICESDK_JWT_SECRET"],
          }
          print(json.dumps({"stringData": data}, ensure_ascii=False))
          PY
          )"
          kubectl -n "${KUBE_NAMESPACE}" patch secret "${SECRET_NAME}" --type merge -p "${payload}"
          legacy_prefix='CLAUDE'
          legacy_prefix="${legacy_prefix}OFFICE_"
          for legacy_key in $(kubectl -n "${KUBE_NAMESPACE}" get secret "${SECRET_NAME}" -o json | python3 - "${legacy_prefix}" <<'PY'
          import json
          import sys

          prefix = sys.argv[1]
          payload = json.load(sys.stdin)
          for key in sorted((payload.get("data") or {}).keys()):
              if key.startswith(prefix):
                  print(key)
          PY
          ); do
            if [ -n "$(kubectl -n "${KUBE_NAMESPACE}" get secret "${SECRET_NAME}" -o "jsonpath={.data.${legacy_key}}" 2>/dev/null || true)" ]; then
              json_patch="$(printf '[{"op":"remove","path":"/data/%s"}]' "${legacy_key}")"
              kubectl -n "${KUBE_NAMESPACE}" patch secret "${SECRET_NAME}" --type json -p="${json_patch}" >/dev/null 2>&1 || true
            fi
          done
          kubectl -n "${KUBE_NAMESPACE}" get secret "${SECRET_NAME}" -o jsonpath='{.data.OFFICESDK_ENDPOINT}' | base64 -d
          echo
          if [ "${RESTART_DEPLOYMENT}" = "true" ]; then
            kubectl -n "${KUBE_NAMESPACE}" rollout restart "deploy/${DEPLOYMENT_NAME}"
            kubectl -n "${KUBE_NAMESPACE}" rollout status "deploy/${DEPLOYMENT_NAME}" --timeout=180s
          fi
          EOF
