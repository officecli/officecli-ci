name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish, for example v0.2.6'
        required: true
        type: string
      dist_repo:
        description: 'Public dist repository'
        required: false
        default: 'officecli/officecli-dist'
        type: string

concurrency:
  group: npm-publish-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  SOURCE_REPO: officecli/officecli
  SOURCE_DEFAULT_BRANCH: main
  PUBLIC_NPM_REPO: officecli/officecli-npm
  PUBLIC_NPM_DEFAULT_BRANCH: main

jobs:
  publish:
    name: Publish Wrapper To NPM
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.version }}
      DIST_REPO: ${{ inputs.dist_repo || vars.PUBLIC_DIST_REPO || 'officecli/officecli-dist' }}
    steps:
      - name: Checkout private source repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version) }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Normalize and validate release tag
        shell: bash
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          release_tag="${RELEASE_TAG}"
          if [[ "${release_tag}" != v* ]]; then
            release_tag="v${release_tag}"
          fi
          if ! git rev-parse "${release_tag}^{commit}" >/dev/null 2>&1; then
            git remote set-url origin "https://x-access-token:${SOURCE_REPO_TOKEN}@github.com/${SOURCE_REPO}.git"
            git fetch --tags --force origin
          fi
          git rev-parse "${release_tag}^{commit}" >/dev/null 2>&1
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"

      - name: Ensure public dist release exists
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_DIST_REPO_TOKEN || github.token }}
        run: gh release view "${RELEASE_TAG}" -R "${DIST_REPO}" >/dev/null

      - name: Check wrapper version
        working-directory: packages/npm/officecli
        run: npm run check:release-version

      - name: Pack wrapper
        working-directory: packages/npm/officecli
        run: npm pack

      - name: Sync public npm repository
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_NPM_REPO_TOKEN }}
          PUBLIC_NPM_REPO: ${{ env.PUBLIC_NPM_REPO }}
          PUBLIC_NPM_DEFAULT_BRANCH: ${{ env.PUBLIC_NPM_DEFAULT_BRANCH }}
        run: bash ./scripts/sync-public-npm-repo.sh

      - name: Wait for npm package version
        shell: bash
        run: |
          set -euo pipefail
          target_version="${{ steps.meta.outputs.package_version }}"
          for attempt in $(seq 1 30); do
            current="$(
              curl -fsSL "https://registry.npmjs.org/officecli/latest?ts=$(date +%s)" \
                | node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(String(data.version || ''));"
            )"
            if [ "${current}" = "${target_version}" ]; then
              echo "npm package officecli@${target_version} is available"
              exit 0
            fi
            echo "waiting for npm package officecli@${target_version} (${attempt}/30); current=${current:-missing}"
            sleep 10
          done
          echo "timed out waiting for npm package officecli@${target_version}" >&2
          exit 1
